{{- if and (eq .Values.hyperdx.secrets nil) (not .Values.hyperdx.existingSecret.name) (or .Values.mongodb.enabled .Values.clickhouse.enabled (index .Values "otel-collector" "enabled")) }}
{{- fail "hyperdx.secrets cannot be null when mongodb, clickhouse, or otel-collector is enabled -- these subcharts require the clickstack-secret for credentials" }}
{{- end }}
{{- $otelReferencesExistingSecret := false }}
{{- range $envFrom := (index .Values "otel-collector" "extraEnvsFrom" | default list) }}
{{- if eq (dig "secretRef" "name" "" $envFrom) $.Values.hyperdx.existingSecret.name }}
{{- $otelReferencesExistingSecret = true }}
{{- end }}
{{- end }}
{{- if and .Values.hyperdx.existingSecret.name (ne .Values.hyperdx.existingSecret.name "clickstack-secret") (index .Values "otel-collector" "enabled") (not $otelReferencesExistingSecret) }}
{{- fail "otel-collector.extraEnvsFrom must reference hyperdx.existingSecret.name when otel-collector is enabled and the existing Secret name is not clickstack-secret" }}
{{- end }}
{{- if and (ne .Values.hyperdx.secrets nil) (not .Values.hyperdx.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clickstack.hyperdx.secretName" . }}
  labels:
    {{- include "clickstack.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.hyperdx.secrets }}
  {{ $k }}: {{ tpl (toString $v) $ | quote }}
  {{- end }}
{{- end }}
