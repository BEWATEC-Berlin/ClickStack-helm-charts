suite: Test Ingress Enabled Coverage
templates:
  - hyperdx/ingress.yaml
values:
  - values/ingress-enabled.yaml
tests:
  - it: should render primary ingress when enabled
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: alb
      - equal:
          path: metadata.annotations["alb.ingress.kubernetes.io/scheme"]
          value: internet-facing
