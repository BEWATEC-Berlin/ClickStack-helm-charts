suite: Test External Secret Mode

_externalSecretValues: &external-secret-values
  hyperdx:
    secrets: null
    existingSecret:
      name: managed-clickstack-secret
    configSecretRefs:
      MONGO_URI:
        name: managed-clickstack-config
        key: mongo-uri
    deployment:
      useExistingConfigSecret: true
      existingConfigSecret: managed-clickstack-config
      existingConfigConnectionsKey: connections.json
      existingConfigSourcesKey: sources.json
    tasks:
      enabled: true
  mongodb:
    existingPasswordSecret:
      name: managed-mongodb-password
  clickhouse:
    existingUserPasswordSecret:
      name: managed-clickhouse-users
      appPasswordKey: app-password
      otelCollectorPasswordKey: otel-password
  otel-collector:
    extraEnvsFrom:
      - configMapRef:
          name: clickstack-config
      - secretRef:
          name: managed-clickstack-secret

tests:
  - it: should not render chart-managed shared Secret
    templates:
      - hyperdx/secret.yaml
    set: *external-secret-values
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render chart-managed MongoDB password Secret
    templates:
      - mongodb/password-secret.yaml
    set: *external-secret-values
    asserts:
      - hasDocuments:
          count: 0

  - it: should omit Secret-backed config values from clickstack-config
    templates:
      - hyperdx/configmap.yaml
    set: *external-secret-values
    asserts:
      - notExists:
          path: data.MONGO_URI

  - it: should wire HyperDX deployment to externally managed Secrets
    templates:
      - hyperdx/deployment.yaml
    set: *external-secret-values
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: managed-clickstack-secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MONGO_URI
            valueFrom:
              secretKeyRef:
                name: managed-clickstack-config
                key: mongo-uri
                optional: false
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_CONNECTIONS
            valueFrom:
              secretKeyRef:
                name: managed-clickstack-config
                key: connections.json
                optional: false

  - it: should wire check-alerts task to externally managed Secrets
    templates:
      - hyperdx/cronjob-check-alerts.yaml
    set: *external-secret-values
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: managed-clickstack-secret
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: DEFAULT_CONNECTIONS
            valueFrom:
              secretKeyRef:
                name: managed-clickstack-config
                key: connections.json
                optional: false

  - it: should wire MongoDBCommunity to externally managed password Secret
    templates:
      - mongodb/community.yaml
    set: *external-secret-values
    asserts:
      - equal:
          path: spec.users[0].passwordSecretRef.name
          value: managed-mongodb-password

  - it: should wire ClickHouse users to externally managed password Secret
    templates:
      - clickhouse/cluster.yaml
    set: *external-secret-values
    asserts:
      - equal:
          path: spec.settings.extraUsersConfig.users.app.password.@from_env
          value: CLICKHOUSE_APP_PASSWORD
      - equal:
          path: spec.settings.extraUsersConfig.users.otelcollector.password.@from_env
          value: CLICKHOUSE_PASSWORD
      - contains:
          path: spec.containerTemplate.env
          content:
            name: CLICKHOUSE_APP_PASSWORD
            valueFrom:
              secretKeyRef:
                name: managed-clickhouse-users
                key: app-password
      - contains:
          path: spec.containerTemplate.env
          content:
            name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: managed-clickhouse-users
                key: otel-password
