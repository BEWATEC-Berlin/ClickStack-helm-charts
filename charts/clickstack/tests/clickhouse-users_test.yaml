suite: Test ClickHouse Users Configuration
templates:
  - clickhouse/cluster.yaml

tests:
  - it: should include app user in extraUsersConfig
    asserts:
      - isNotNull:
          path: spec.settings.extraUsersConfig.users.app
      - equal:
          path: spec.settings.extraUsersConfig.users.app.profile
          value: default

  - it: should include otelcollector user in extraUsersConfig
    asserts:
      - isNotNull:
          path: spec.settings.extraUsersConfig.users.otelcollector
      - equal:
          path: spec.settings.extraUsersConfig.users.otelcollector.profile
          value: default

  - it: should resolve password template expressions from hyperdx.secrets
    set:
      hyperdx:
        secrets:
          CLICKHOUSE_APP_PASSWORD: "test-app-pass"
          CLICKHOUSE_PASSWORD: "test-otel-pass"
    asserts:
      - equal:
          path: spec.settings.extraUsersConfig.users.app.password
          value: "test-app-pass"
      - equal:
          path: spec.settings.extraUsersConfig.users.otelcollector.password
          value: "test-otel-pass"

  - it: should use externally managed user password Secret when configured
    set:
      clickhouse:
        existingUserPasswordSecret:
          name: managed-clickhouse-users
          appPasswordKey: app-password
          otelCollectorPasswordKey: otel-password
    asserts:
      - equal:
          path: spec.settings.extraUsersConfig.users.app.password.@from_env
          value: CLICKHOUSE_APP_PASSWORD
      - equal:
          path: spec.settings.extraUsersConfig.users.otelcollector.password.@from_env
          value: CLICKHOUSE_PASSWORD
      - contains:
          path: spec.containerTemplate.env
          content:
            name: CLICKHOUSE_APP_PASSWORD
            valueFrom:
              secretKeyRef:
                name: managed-clickhouse-users
                key: app-password
      - contains:
          path: spec.containerTemplate.env
          content:
            name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: managed-clickhouse-users
                key: otel-password

  - it: should fail when existing shared Secret mode does not externalize ClickHouse user passwords
    set:
      hyperdx:
        secrets: null
        existingSecret:
          name: managed-clickstack-secret
    asserts:
      - failedTemplate:
          errorMessage: "clickhouse.existingUserPasswordSecret.name is required when hyperdx.existingSecret.name is set and clickhouse is enabled"

  - it: should not create missing default users when externally managed user password Secret is configured
    set:
      clickhouse:
        existingUserPasswordSecret:
          name: managed-clickhouse-users
        cluster:
          spec:
            settings:
              extraUsersConfig:
                users:
                  app: null
                  otelcollector: null
                  custom:
                    profile: default
                    password: custom-password
    asserts:
      - notExists:
          path: spec.settings.extraUsersConfig.users.app
      - notExists:
          path: spec.settings.extraUsersConfig.users.otelcollector
      - equal:
          path: spec.settings.extraUsersConfig.users.custom.password
          value: custom-password
      - notExists:
          path: spec.containerTemplate.env

  - it: should fail when app password env is already defined
    set:
      clickhouse:
        existingUserPasswordSecret:
          name: managed-clickhouse-users
        cluster:
          spec:
            containerTemplate:
              env:
                - name: CLICKHOUSE_APP_PASSWORD
                  value: custom
    asserts:
      - failedTemplate:
          errorMessage: "clickhouse.cluster.spec.containerTemplate.env must not define CLICKHOUSE_APP_PASSWORD when clickhouse.existingUserPasswordSecret.name is set and the app user is managed"

  - it: should fail when otelcollector password env is already defined
    set:
      clickhouse:
        existingUserPasswordSecret:
          name: managed-clickhouse-users
        cluster:
          spec:
            containerTemplate:
              env:
                - name: CLICKHOUSE_PASSWORD
                  value: custom
    asserts:
      - failedTemplate:
          errorMessage: "clickhouse.cluster.spec.containerTemplate.env must not define CLICKHOUSE_PASSWORD when clickhouse.existingUserPasswordSecret.name is set and the otelcollector user is managed"
