name: Helm Template Coverage

on:
  push:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/helmcov.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/helmcov.yaml'

jobs:
  helmcov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Run template coverage
        run: make coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: helmcov-reports
          path: |
            coverage.out
            coverage.xml
